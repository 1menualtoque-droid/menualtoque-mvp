name: Infrastructure - Terraform

on:
  push:
    branches: [ main, develop ]
    paths: 
      - 'infrastructure/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'infrastructure/**'
  workflow_dispatch:
    inputs:
      terraform_action:
        description: 'Terraform action to perform'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  TF_VERSION: "1.6"
  TERRAFORM_DIR: "infrastructure/terraform"

jobs:
  # ============================================
  # Terraform Plan/Apply
  # ============================================
  terraform:
    name: Terraform ${{ github.event.inputs.terraform_action || 'plan' }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production' || 'staging') }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          service_account_key: ${{ secrets.GCP_SA_KEY_TERRAFORM }}
          export_default_credentials: true

      - name: Determine environment
        id: env
        run: |
          if [ "${{ github.event.inputs.environment }}" != "" ]; then
            ENV="${{ github.event.inputs.environment }}"
          elif [ "${{ github.ref }}" == "refs/heads/main" ]; then
            ENV="production"
          else
            ENV="staging"
          fi
          echo "environment=${ENV}" >> $GITHUB_OUTPUT
          echo "📋 Target environment: ${ENV}"

      - name: Terraform fmt check
        run: |
          cd ${{ env.TERRAFORM_DIR }}
          terraform fmt -check -recursive

      - name: Terraform init
        run: |
          cd ${{ env.TERRAFORM_DIR }}
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="prefix=${{ steps.env.outputs.environment }}"

      - name: Terraform validate
        run: |
          cd ${{ env.TERRAFORM_DIR }}
          terraform validate

      - name: Terraform plan
        id: plan
        run: |
          cd ${{ env.TERRAFORM_DIR }}
          terraform plan \
            -var-file="environments/${{ steps.env.outputs.environment }}.tfvars" \
            -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
            -var="database_password=${{ secrets.DATABASE_PASSWORD }}" \
            -var="jwt_secret=${{ secrets.JWT_SECRET }}" \
            -var="resend_api_key=${{ secrets.RESEND_API_KEY }}" \
            -var="google_client_id=${{ secrets.GOOGLE_CLIENT_ID }}" \
            -out=tfplan \
            -no-color
        continue-on-error: true

      - name: Comment PR with plan
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `
            ## 🏗️ Terraform Plan Results
            
            **Environment:** \`${{ steps.env.outputs.environment }}\`
            **Plan Status:** \`${{ steps.plan.outcome }}\`
            
            <details>
            <summary>📋 Show Plan</summary>
            
            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\`
            
            </details>
            
            *Triggered by @${{ github.actor }} in commit ${{ github.sha }}*
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Terraform apply
        if: |
          (github.event.inputs.terraform_action == 'apply') ||
          (github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.plan.outcome == 'success')
        run: |
          cd ${{ env.TERRAFORM_DIR }}
          terraform apply -auto-approve tfplan

      - name: Terraform destroy
        if: github.event.inputs.terraform_action == 'destroy'
        run: |
          cd ${{ env.TERRAFORM_DIR }}
          echo "⚠️ DESTROYING INFRASTRUCTURE FOR ${{ steps.env.outputs.environment }}"
          terraform destroy \
            -var-file="environments/${{ steps.env.outputs.environment }}.tfvars" \
            -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
            -var="database_password=${{ secrets.DATABASE_PASSWORD }}" \
            -var="jwt_secret=${{ secrets.JWT_SECRET }}" \
            -var="resend_api_key=${{ secrets.RESEND_API_KEY }}" \
            -var="google_client_id=${{ secrets.GOOGLE_CLIENT_ID }}" \
            -auto-approve

      - name: Terraform outputs
        if: |
          (github.event.inputs.terraform_action == 'apply') ||
          (github.event_name == 'push' && github.ref == 'refs/heads/main')
        run: |
          cd ${{ env.TERRAFORM_DIR }}
          echo "=== TERRAFORM OUTPUTS ==="
          terraform output -json

  # ============================================
  # Security Scanning
  # ============================================
  security-scan:
    name: Security Scan Infrastructure
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: infrastructure/terraform
          framework: terraform
          output_format: sarif
          output_file_path: checkov-report.sarif
        continue-on-error: true

      - name: Upload Checkov results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov-report.sarif
